name: CI

on:
  push:
  pull_request:

jobs:
  package-static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Unity package manifest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          package = Path('unity/Packages/com.yuspec.unity/package.json')
          assert package.exists(), 'package.json missing'

          data = json.loads(package.read_text(encoding='utf-8'))
          assert data['name'] == 'com.yuspec.unity'
          assert data['version'] == '1.1.0'
          assert 'displayName' in data
          assert 'unity' in data
          print('package.json OK')
          PY

      - name: Check required files
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f docs/releases/v1.1.0.md
          test -f docs/release-checklist.md
          test -f unity/Packages/com.yuspec.unity/README.md
          test -f unity/Packages/com.yuspec.unity/Runtime/YuspecRuntime.cs
          test -f unity/Packages/com.yuspec.unity/Runtime/YuspecSpecParser.cs
          test -f unity/Packages/com.yuspec.unity/Samples~/DoorExample/DoorExample.yuspec
          test -f unity/Packages/com.yuspec.unity/Samples~/GoblinAI/GoblinAI.yuspec
          test -f unity/Packages/com.yuspec.unity/Samples~/DemoDungeon/DemoDungeon.yuspec

      - name: Check line counts for critical files
        run: |
          python - <<'PY'
          from pathlib import Path

          requirements = {
              'README.md': 100,
              'unity/Packages/com.yuspec.unity/Runtime/YuspecRuntime.cs': 50,
              'unity/Packages/com.yuspec.unity/Runtime/YuspecSpecParser.cs': 50,
              'unity/Packages/com.yuspec.unity/Samples~/DoorExample/DoorExample.yuspec': 10,
              'unity/Packages/com.yuspec.unity/package.json': 10,
          }

          for path_text, minimum in requirements.items():
              count = len(Path(path_text).read_text(encoding='utf-8').splitlines())
              assert count > minimum, f'{path_text} has {count} lines, expected > {minimum}'
              print(f'{path_text}: {count}')
          PY
